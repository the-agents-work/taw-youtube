<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Echoly</title>
<link rel="stylesheet" href="popup.css" />
</head>
<body data-state="idle">

<main class="shell">

  <header class="topline">
    <div class="brand">
      <span class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
          <path d="M7 9v6M11 6v12M15 8v8M19 11v2"/>
        </svg>
      </span>
      <div>
        <p class="eyebrow">Live Translator</p>
        <h1>Echoly</h1>
      </div>
    </div>
    <span class="dot" data-status-dot aria-hidden="true"></span>
  </header>

  <section class="row">
    <label for="tier">Tier</label>
    <select id="tier">
      <option value="realtime">Realtime · clones speaker · &lt;1s</option>
      <option value="standard">Standard · ~5s lag · cheaper</option>
    </select>
  </section>

  <section class="row">
    <label for="voice">Voice</label>
    <select id="voice"></select>
  </section>

  <section class="row">
    <label for="lang">Language</label>
    <select id="lang"></select>
  </section>

  <section class="secret">
    <div class="row">
      <label for="kymaKey">Kyma key</label>
      <span id="keyBadge" class="badge">missing</span>
    </div>
    <input id="kymaKey" type="password" placeholder="ky-..." autocomplete="off" spellcheck="false" />
  </section>

  <button class="action" id="toggle">Start</button>

  <section class="mix">
    <div class="mix-row">
      <label for="originalVolume">Original</label>
      <input id="originalVolume" type="range" min="0" max="100" value="18" />
      <output id="originalOut">18</output>
    </div>
    <div class="mix-row">
      <label for="voiceVolume">Voice</label>
      <input id="voiceVolume" type="range" min="0" max="100" value="100" />
      <output id="voiceOut">100</output>
    </div>
  </section>

  <label class="toggle-row">
    <span>Show source captions</span>
    <input id="showSource" type="checkbox" />
  </label>

  <details class="advanced">
    <summary>Advanced</summary>
    <div class="advanced-body">
      <div>
        <strong>Plans</strong>: Free 30 min/month, Pro $9/mo (10h), Max $24.90/mo (50h + 2h realtime). Or paste your Kyma key for unlimited at wholesale cost (above).
      </div>
      <div>
        <a href="https://echolyhq.com/#pricing" target="_blank">Subscribe</a> ·
        <a href="https://echolyhq.com/account" target="_blank">Account</a> ·
        <a href="https://kymaapi.com/billing" target="_blank">Kyma billing</a> (BYOK)
      </div>
      <div class="hint">
        Sessions auto-stop at 60 minutes. Press Stop to end early.
      </div>
    </div>
  </details>

  <p class="status" id="status">Ready.</p>

</main>

<script src="popup.js"></script>
</body>
</html>
