<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TAW YouTube</title>
<link rel="stylesheet" href="popup.css" />
</head>
<body data-state="idle">

<main class="shell">

  <header class="topline">
    <div class="brand">
      <span class="mark aurora-mark" aria-hidden="true">
          <span style="color:#fff;font-weight:700;font-size:12px;line-height:1">t</span>
      </span>
      <div>
        <h1>taw youtube</h1>
      </div>
    </div>
    <span id="tier-badge" class="tier-badge" data-tier="free">Key needed</span>
  </header>

  <section class="row">
    <label for="lang">Language</label>
    <select id="lang"></select>
  </section>

  <section class="secret">
    <div class="row">
      <label for="openaiKey">OpenAI API key <span class="badge" style="font-weight:500;color:var(--label-tertiary);background:transparent;padding:0">— BYOK</span></label>
      <span id="keyBadge" class="badge">missing</span>
    </div>
    <input id="openaiKey" type="password" placeholder="sk-..." autocomplete="off" spellcheck="false" />
  </section>

  <button class="action" id="toggle">Start</button>

  <details class="advanced">
    <summary>Advanced</summary>
    <div class="advanced-body">
      <div>
        <strong>Smart captions</strong>: finds English YouTube captions, pauses briefly, translates ahead, then shows English + Vietnamese in sync.
      </div>
      <div>
        <a href="https://platform.openai.com/api-keys" target="_blank">API keys</a> ·
        <a href="https://platform.openai.com/usage" target="_blank">Usage</a>
      </div>
      <div class="hint">
        Sessions auto-stop at 60 minutes. Press Stop to end early.
      </div>
    </div>
  </details>

  <p class="status" id="status">Ready.</p>

</main>

<script src="popup.js"></script>
</body>
</html>
